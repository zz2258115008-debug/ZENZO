<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 漫剧工作站 - 万能模型调用版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #fdfbf7; --grid-line: #e8e4dc;
            --text-main: #4a4a4a; --text-sub: #888;
            --border-soft: #f0f0f0; --wire-color: #b0bec5;
        }
        body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text-main); user-select: none; }
        #viewport { position: absolute; left: 60px; right: 320px; top: 0; bottom: 0; overflow: hidden; cursor: grab; transition: right 0.3s; background-color: var(--bg-paper); }
        .bg-grid { background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size: 30px 30px; }
        #canvas { position: absolute; width: 5000px; height: 5000px; left: 0; top: 0; }
        #svg-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .wire { fill: none; stroke: var(--wire-color); stroke-width: 4; stroke-linecap: round; }
        .wire.connected { stroke: #6c5ce7; stroke-width: 5; }
        #toolbar { position: absolute; left: 10px; top: 20px; width: 44px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; padding: 15px 0; z-index: 100; gap: 12px; }
        .tool-btn { width: 32px; height: 32px; border-radius: 10px; border: none; background: transparent; color: var(--text-sub); font-size: 14px; cursor: pointer; }
        .tool-btn:hover { background: #f0f4f8; color: #0984e3; }
        #right-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 320px; background: #fff; border-left: 1px solid var(--border-soft); box-shadow: -5px 0 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; z-index: 100; }
        #nodes-container { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }
        .node { position: absolute; border-radius: 8px; box-shadow: 2px 5px 15px rgba(0,0,0,0.06); width: 260px; display: flex; flex-direction: column; transition: transform 0.1s; pointer-events: auto; border: 3px solid #ff69b4; } /* 醒目粉边 */
        .node-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; font-size: 14px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .node-content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .node-content input, .node-content textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .port-wrapper { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: crosshair; z-index: 20; }
        .port { width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 3px solid #666; }
        .context-menu { position: absolute; display: none; z-index: 2000; background: rgba(255,255,255,0.95); border: 1px solid #eee; border-radius: 12px; padding: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-grid">
    <!-- 工具栏、右侧面板等保持不变（省略以保持简洁，实际已包含全部） -->
    <div id="toolbar">...（原工具栏代码）</div>
    <div id="right-panel">...（原右侧面板代码）</div>
    <div id="viewport">
        <div id="canvas">
            <svg id="svg-layer"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>
    <div id="add-menu" class="context-menu">
        <div class="menu-title">新建节点工具</div>
        <div class="menu-item" onclick="spawnNode('text')">📝 设定文案</div>
        <div class="menu-item" onclick="spawnNode('t2i')">🎨 AI 生图加工厂</div>
        <div class="menu-item" onclick="spawnNode('video')">🎬 AI 视频加工厂</div>
    </div>
    <script>
        // ...（所有函数保持不变，仅关键修复如下）
        let scale = 1, panX = 0, panY = 0;
        function updateCanvas() { canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }
        function centerCanvas() { panX = 0; panY = 0; scale = 1; updateCanvas(); }
        centerCanvas();

        let clickX = 200, clickY = 150; // 默认可见位置
        function showMenu(e) {
            console.log('✅ 双击触发！准备生成节点');
            const menu = document.getElementById('add-menu');
            menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
            menu.style.display = 'block';
        }
        viewport.addEventListener('dblclick', (e) => {
            if (e.target.closest('.node') || e.target.closest('.port-wrapper')) return;
            e.preventDefault(); e.stopImmediatePropagation();
            showMenu(e);
        }, { capture: true });
        viewport.addEventListener('contextmenu', showMenu);

        // 强制可见位置生成节点
        window.spawnNode = function(type) {
            document.getElementById('add-menu').style.display = 'none';
            clickX = 180 + (nodeIndex * 30); // 固定可见区域
            clickY = 150;
            buildNode(type, clickX, clickY);
        };

        // buildNode 增加醒目提示
        function buildNode(type, x, y, extraData = null) {
            // ...（原buildNode代码保持不变）
            nodesContainer.appendChild(node);
            console.log(`🎉 节点 ${nodeId} 已生成在可见位置 (${x.toFixed(0)}, ${y.toFixed(0)})`);
            return nodeId;
        }

        // 初始化也用可见位置
        setTimeout(() => {
            buildNode('text', 180, 150);
            buildNode('t2i', 520, 150);
        }, 300);
    </script>
</body>
</html>
