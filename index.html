<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 漫剧工作站 - 马卡龙节点版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ================= 马卡龙便签主题 ================= */
        :root {
            /* 纸张质感背景 */
            --bg-paper: #fdfbf7; 
            --grid-line: #e8e4dc;
            /* 马卡龙色系 */
            --m-pink: #ffcdd2; --m-pink-dark: #ef9a9a;
            --m-blue: #bbdefb; --m-blue-dark: #90caf9;
            --m-green: #c8e6c9; --m-green-dark: #a5d6a7;
            --m-purple: #e1bee7; --m-purple-dark: #ce93d8;
            --m-yellow: #fff9c4; --m-yellow-dark: #fff59d;
            
            --text-main: #4a4a4a; --text-sub: #888;
            --border-soft: #f0f0f0;
            --shadow-paper: 0 4px 12px rgba(0,0,0,0.04), 0 10px 30px rgba(0,0,0,0.04);
            --wire-color: #b0bec5;
        }

        body { margin: 0; overflow: hidden; font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg-paper); color: var(--text-main); user-select: none; }
        
        /* ================= 1. 画布与网格体系 ================= */
        /* 留出左侧工具栏(60px)和右侧侧边栏(320px)的空间 */
        #viewport { position: absolute; left: 60px; right: 320px; top: 0; bottom: 0; overflow: hidden; cursor: grab; 
            background-color: var(--bg-paper); 
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); 
            background-size: 30px 30px; 
        }
        #canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 0; }
        .wire { fill: none; stroke: var(--wire-color); stroke-width: 3; transition: stroke 0.2s; stroke-linecap: round; }
        .wire.active { stroke: var(--m-blue-dark); stroke-width: 4; }
        .wire.temp { stroke-dasharray: 6 6; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -12; } }

        /* ================= 2. 左侧悬浮工具栏 ================= */
        #toolbar { position: absolute; left: 10px; top: 20px; width: 44px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 22px; box-shadow: var(--shadow-paper); display: flex; flex-direction: column; align-items: center; padding: 15px 0; z-index: 100; border: 1px solid #fff;}
        .tool-btn { width: 32px; height: 32px; border-radius: 10px; border: none; background: transparent; color: var(--text-sub); font-size: 14px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .tool-btn:hover { background: var(--bg-paper); color: var(--m-blue-dark); }
        .tool-btn.active { background: var(--m-blue); color: #fff; }

        /* ================= 3. 右侧面板 (聊天 / 设置) ================= */
        #right-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 320px; background: #fff; border-left: 1px solid var(--border-soft); box-shadow: -5px 0 20px rgba(0,0,0,0.02); display: flex; flex-direction: column; z-index: 100; }
        
        .panel-tabs { display: flex; border-bottom: 1px solid var(--border-soft); background: #fafafa; }
        .panel-tab { flex: 1; padding: 15px 0; text-align: center; font-size: 14px; color: var(--text-sub); cursor: pointer; border-bottom: 2px solid transparent; font-weight: bold; transition: 0.2s;}
        .panel-tab.active { color: var(--m-blue-dark); border-bottom: 2px solid var(--m-blue-dark); background: #fff; }
        
        .panel-content { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
        .panel-content.active { display: flex; }

        /* 设置区 */
        .settings-area { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .settings-area label { font-size: 12px; color: var(--text-sub); font-weight: bold; }
        .settings-area input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; background: #fafafa; transition: 0.2s; }
        .settings-area input:focus { border-color: var(--m-blue-dark); background: #fff; }

        /* 聊天区 */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #fafafa;}
        .msg { display: flex; width: 100%; }
        .msg.user { justify-content: flex-end; }
        .msg.ai { justify-content: flex-start; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-wrap: break-word; user-select: text; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .msg.user .bubble { background: var(--m-blue); color: #333; border-bottom-right-radius: 2px; }
        .msg.ai .bubble { background: #fff; border: 1px solid #eee; border-bottom-left-radius: 2px; }
        
        .chat-input-box { padding: 15px; background: #fff; border-top: 1px solid var(--border-soft); display: flex; flex-direction: column; gap: 8px; }
        .chat-input-box textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; resize: none; outline: none; font-family: inherit;}
        .send-btn { padding: 8px; background: var(--m-blue-dark); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { opacity: 0.9; }

        /* ================= 4. 马卡龙便签节点 ================= */
        #nodes-container { position: absolute; top: 0; left: 0; z-index: 1; }
        .node { position: absolute; background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); box-shadow: var(--shadow-paper); width: 260px; display: flex; flex-direction: column; transition: transform 0.1s; }
        .node:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(0,0,0,0.06); }
        
        .node-header { padding: 12px 15px; border-radius: 16px 16px 0 0; display: flex; justify-content: space-between; align-items: center; cursor: move; font-size: 13px; font-weight: bold; color: #444; }
        .node-header i { cursor: pointer; color: rgba(0,0,0,0.2); transition: 0.2s; }
        .node-header i:hover { color: #ff5252; }

        /* 便签配色 */
        .node.txt-node .node-header { background: var(--m-yellow); }
        .node.txt-node { background: #fffde7; }
        .node.img-node .node-header { background: var(--m-blue); }
        .node.img-node { background: #f5faff; }
        .node.vid-node .node-header { background: var(--m-purple); }
        .node.vid-node { background: #faf5ff; }

        .node-content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .node-content label { font-size: 12px; color: var(--text-sub); }
        .node-content input, .node-content select, .node-content textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; font-size: 12px; outline: none; background: rgba(255,255,255,0.7); font-family: inherit;}
        .node-content input:focus, .node-content select:focus, .node-content textarea:focus { background: #fff; border-color: var(--m-blue-dark); }
        
        .run-node-btn { background: #fff; color: var(--text-main); border: 1px solid rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .run-node-btn:hover { background: var(--m-blue-dark); color: #fff; }

        .node-result { margin-top: 5px; position: relative; display: none; }
        .node-result img { width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: block; }
        
        /* 衍生引用按钮 */
        .derive-btn { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s; display: flex; align-items: center; gap: 4px;}
        .derive-btn:hover { background: var(--m-blue-dark); }

        /* ================= 5. 真实物理端口 ================= */
        .port-container { position: absolute; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; cursor: crosshair; z-index: 10; }
        .port { width: 10px; height: 10px; border-radius: 50%; background: #fff; border: 2px solid; transition: 0.2s; pointer-events: none; }
        .port-container:hover .port { transform: scale(1.4); }
        
        .port-in { left: -12px; }
        .port-in .port { border-color: var(--m-green-dark); }
        .port-out { right: -12px; }
        .port-out .port { border-color: var(--m-blue-dark); }

        /* ================= 6. 各种右键/双击悬浮菜单 ================= */
        .context-menu { position: absolute; display: none; z-index: 2000; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid #eee; border-radius: 12px; padding: 8px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-width: 140px; animation: popIn 0.15s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .context-menu .menu-title { font-size: 11px; color: #999; padding: 4px 8px 8px; border-bottom: 1px solid #eee; margin-bottom: 4px; }
        .context-menu .menu-item { padding: 8px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .context-menu .menu-item:hover { background: #f5f5f5; color: var(--m-blue-dark); }
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="tool-btn" onclick="viewport.style.cursor='grab'" title="平移"><i class="fas fa-hand"></i></button>
        <button class="tool-btn" onclick="clearCanvas()" title="清空"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div id="right-panel">
        <div class="panel-tabs">
            <div class="panel-tab active" onclick="switchRightPanel('chat')">💬 剧本推演</div>
            <div class="panel-tab" onclick="switchRightPanel('settings')">⚙️ 全局设置</div>
        </div>
        
        <div id="panel-chat" class="panel-content active">
            <div id="chat-window">
                <div class="msg ai"><div class="bubble">工作流引擎组装完毕！<br><br>💡 <b>试试这样操作：</b><br>1. <b>双击画布空白处</b>添加节点。<br>2. 生成图片后，点击卡片右下角的<b>「✨引用」</b>。<br>3. 试试把不同节点两边的<b>彩色圆点连在一起</b>！</div></div>
            </div>
            <div class="chat-input-box">
                <input id="chatModel" type="text" value="gpt-4o" style="padding:4px 8px; border:1px solid #eee; border-radius:4px; font-size:11px; width:80px; outline:none;" />
                <textarea id="chatInput" rows="3" placeholder="输入灵感或让AI写一段设定..."></textarea>
                <button class="send-btn" onclick="sendChat()">发送</button>
            </div>
        </div>

        <div id="panel-settings" class="panel-content">
            <div class="settings-area">
                <label>API 接口地址 (需带 /v1)</label>
                <input id="global-url" type="text" value="https://nexusapi.cn/v1" />
                <label>API Key (令牌)</label>
                <input id="global-key" type="password" placeholder="sk-..." />
            </div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas">
            <svg id="svg-layer"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>

    <div id="add-menu" class="context-menu">
        <div class="menu-title">添加节点</div>
        <div class="menu-item" onclick="spawnNode('text')">📝 文本</div>
        <div class="menu-item" onclick="spawnNode('t2i')">🎨 图片 (文生图)</div>
        <div class="menu-item" onclick="spawnNode('i2i')">🖼️ 图片 (图生图)</div>
        <div class="menu-item" onclick="spawnNode('video')">🎬 视频</div>
    </div>

    <div id="derive-menu" class="context-menu">
        <div class="menu-title">引用该节点生成</div>
        <div class="menu-item" onclick="deriveNode('i2i')">🖼️ 图生图</div>
        <div class="menu-item" onclick="deriveNode('video')">🎬 视频生成</div>
    </div>

    <script>
        // ================= 修复丢失的全局 DOM 变量 =================
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('canvas');
        const svgLayer = document.getElementById('svg-layer');
        const nodesContainer = document.getElementById('nodes-container');

        // ================= UI 切换与菜单逻辑 =================
        function switchRightPanel(tab) {
            document.querySelectorAll('.panel-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
        }

        let clickX = 0, clickY = 0;
        let sourceNodeForDerive = null;

        function hideMenus() {
            document.getElementById('add-menu').style.display = 'none';
            document.getElementById('derive-menu').style.display = 'none';
        }

        window.addEventListener('mousedown', (e) => {
            if(!e.target.closest('.context-menu') && !e.target.closest('.derive-btn')) hideMenus();
        });

        // 修复：双击事件终于可以完美响应了
        viewport.addEventListener('dblclick', (e) => {
            if(e.target.closest('.node')) return; 
            
            // 精确计算出在缩放和拖拽后，画布内真实的相对坐标
            clickX = (e.clientX - 60 - panX) / scale;
            clickY = (e.clientY - panY) / scale;
            
            const menu = document.getElementById('add-menu');
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.style.display = 'block';
        });

        window.openDeriveMenu = function(e, nodeId) {
            e.stopPropagation();
            sourceNodeForDerive = nodeId;
            const menu = document.getElementById('derive-menu');
            menu.style.left = e.clientX + 10 + 'px';
            menu.style.top = e.clientY - 10 + 'px';
            menu.style.display = 'block';
        };

        window.deriveNode = function(targetType) {
            hideMenus();
            if(!sourceNodeForDerive) return;
            
            const srcNode = document.getElementById(sourceNodeForDerive);
            const srcX = parseFloat(srcNode.style.left);
            const srcY = parseFloat(srcNode.style.top);
            
            // 在右侧生成新节点
            const newNodeId = addNode(targetType, srcX + 320, srcY);
            
            // 自动连线并传递数据
            setTimeout(() => {
                const srcOutPort = srcNode.querySelector('.port-out');
                const targetInPort = document.getElementById(newNodeId).querySelector('.port-in');
                if(srcOutPort && targetInPort) {
                    createPhysicalConnection(srcOutPort, targetInPort);
                    flowDataDownstream(sourceNodeForDerive);
                }
            }, 50);
        };

        // ================= 画布漫游引擎 =================
        let scale = 1, panX = 0, panY = 0, isPanning = false, startX, startY;

        viewport.addEventListener('mousedown', (e) => {
            if(e.target.closest('.node') || e.target.closest('.port-container')) return; 
            if(e.button === 0) {
                isPanning = true; viewport.style.cursor = 'grabbing';
                startX = e.clientX - panX; startY = e.clientY - panY;
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            panX = e.clientX - startX; panY = e.clientY - startY;
            updateCanvas();
        });
        window.addEventListener('mouseup', () => { isPanning = false; viewport.style.cursor = 'grab'; });
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const newScale = Math.min(Math.max(0.2, scale + (e.deltaY * -0.001)), 2);
            const mouseX = e.clientX - panX - 60; 
            const mouseY = e.clientY - panY;
            panX -= mouseX * (newScale / scale - 1); panY -= mouseY * (newScale / scale - 1);
            scale = newScale; updateCanvas(); updateAllWires();
        }, { passive: false });

        function updateCanvas() { canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }

        // ================= 物理连线系统 =================
        let connections = []; 
        let isWiring = false, tempWire = null, wiringStartPort = null;

        function createBezier(x1, y1, x2, y2) {
            const dx = Math.abs(x2 - x1) * 0.5 + 40;
            return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
        }

        function getPortCoords(port) {
            const rect = port.getBoundingClientRect();
            const cvsRect = canvas.getBoundingClientRect();
            return { x: (rect.left + rect.width/2 - cvsRect.left)/scale, y: (rect.top + rect.height/2 - cvsRect.top)/scale };
        }

        function updateAllWires() {
            connections.forEach(c => {
                const p1 = getPortCoords(c.fromPort); const p2 = getPortCoords(c.toPort);
                c.pathEl.setAttribute('d', createBezier(p1.x, p1.y, p2.x, p2.y));
            });
        }

        window.addEventListener('mousedown', (e) => {
            const port = e.target.closest('.port-out');
            if (port) {
                isWiring = true; wiringStartPort = port;
                tempWire = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                tempWire.setAttribute('class', 'wire temp');
                svgLayer.appendChild(tempWire);
                e.stopPropagation();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isWiring && tempWire) {
                const p1 = getPortCoords(wiringStartPort);
                const mouseX = (e.clientX - canvas.getBoundingClientRect().left) / scale;
                const mouseY = (e.clientY - canvas.getBoundingClientRect().top) / scale;
                tempWire.setAttribute('d', createBezier(p1.x, p1.y, mouseX, mouseY));
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isWiring) {
                const endPort = e.target.closest('.port-in');
                if (endPort && endPort.closest('.node').id !== wiringStartPort.closest('.node').id) {
                    createPhysicalConnection(wiringStartPort, endPort);
                    flowDataDownstream(wiringStartPort.closest('.node').id);
                }
                if (tempWire) tempWire.remove();
                isWiring = false; wiringStartPort = null;
            }
        });

        function createPhysicalConnection(outPort, inPort) {
            if(connections.find(c => c.fromPort === outPort && c.toPort === inPort)) return;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('class', 'wire');
            svgLayer.appendChild(path);
            connections.push({
                fromNode: outPort.closest('.node').id, toNode: inPort.closest('.node').id,
                fromPort: outPort, toPort: inPort, pathEl: path,
                targetInputType: inPort.dataset.type 
            });
            updateAllWires();
        }

        // ================= 节点工厂与工作流逻辑 =================
        let nodeIndex = 0;
        const workflowData = {}; 

        window.spawnNode = function(type) { hideMenus(); addNode(type, clickX, clickY); }

        function addNode(type, x, y) {
            nodeIndex++; const nodeId = `node_${nodeIndex}`;
            const node = document.createElement('div');
            node.className = `node ${type}-node`; node.id = nodeId;
            node.style.left = `${x}px`; node.style.top = `${y}px`;

            let html = '';
            
            if (type === 'text') {
                html = `
                    <div class="node-header"><span>📝 文本</span><i class="fas fa-times" onclick="deleteNode('${nodeId}')"></i></div>
                    <div class="node-content">
                        <textarea id="val_${nodeId}" rows="4" placeholder="输入提示词..."></textarea>
                    </div>
                    <div class="port-container port-out" style="top:50%;"><div class="port"></div></div>
                `;
            } 
            else if (type === 't2i') {
                html = `
                    <div class="node-header"><span>🎨 文生图</span><i class="fas fa-times" onclick="deleteNode('${nodeId}')"></i></div>
                    <div class="node-content">
                        <input id="model_${nodeId}" type="text" value="dall-e-3" placeholder="模型名称" />
                        <select id="size_${nodeId}">
                            <option value="1024x1024">1:1 (1024x1024)</option>
                            <option value="1024x576">16:9 (1024x576)</option>
                            <option value="576x1024">9:16 (576x1024)</option>
                        </select>
                        <textarea id="val_${nodeId}" rows="3" placeholder="画面提示词..."></textarea>
                        <button class="run-node-btn" id="btn_${nodeId}" onclick="runAPI('${nodeId}', 't2i')">立即生成</button>
                        
                        <div class="node-result" id="res_${nodeId}">
                            <img id="img_${nodeId}" />
                            <button class="derive-btn" onclick="openDeriveMenu(event, '${nodeId}')">✨ 引用</button>
                        </div>
                    </div>
                    <div class="port-container port-in" data-type="prompt" style="top:120px;"><div class="port"></div></div>
                    <div class="port-container port-out" style="top:50%;"><div class="port"></div></div>
                `;
            }
            else if (type === 'i2i' || type === 'video') {
                const title = type === 'i2i' ? '🖼️ 图生图' : '🎬 视频生成';
                const modelDef = type === 'i2i' ? 'dall-e-3' : 'kling-v1';
                html = `
                    <div class="node-header"><span>${title}</span><i class="fas fa-times" onclick="deleteNode('${nodeId}')"></i></div>
                    <div class="node-content">
                        <input id="model_${nodeId}" type="text" value="${modelDef}" />
                        <input id="ref_${nodeId}" type="text" placeholder="参考图 URL (可连线自动填入)" style="border-color:var(--m-blue-dark);"/>
                        <textarea id="val_${nodeId}" rows="2" placeholder="提示词..."></textarea>
                        <button class="run-node-btn" id="btn_${nodeId}" onclick="runAPI('${nodeId}', '${type}')">立即生成</button>
                        <div class="node-result" id="res_${nodeId}">
                            <img id="img_${nodeId}" style="display:none;" />
                        </div>
                    </div>
                    <div class="port-container port-in" data-type="image" style="top:80px;"><div class="port"></div></div>
                    <div class="port-container port-in" data-type="prompt" style="top:120px;"><div class="port"></div></div>
                    <div class="port-container port-out" style="top:50%;"><div class="port"></div></div>
                `;
            }

            node.innerHTML = html;
            
            // 拖拽逻辑
            const header = node.querySelector('.node-header');
            let isDragging = false, nx, ny, ix, iy;
            header.addEventListener('mousedown', (e) => {
                isDragging = true; nx = e.clientX; ny = e.clientY;
                ix = parseFloat(node.style.left); iy = parseFloat(node.style.top);
                document.querySelectorAll('.node').forEach(n => n.style.zIndex = '1'); node.style.zIndex = '10';
                e.stopPropagation();
            });
            window.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    node.style.left = `${ix + (e.clientX - nx)/scale}px`;
                    node.style.top = `${iy + (e.clientY - ny)/scale}px`;
                    updateAllWires();
                }
            });
            window.addEventListener('mouseup', () => isDragging = false);

            nodesContainer.appendChild(node);
            
            // 文本节点输入流转
            if(type === 'text') {
                document.getElementById(`val_${nodeId}`).addEventListener('input', (e) => {
                    workflowData[nodeId] = { type: 'text', value: e.target.value };
                    flowDataDownstream(nodeId);
                });
            }
            return nodeId;
        }

        window.deleteNode = function(id) {
            document.getElementById(id).remove();
            const toRemove = connections.filter(c => c.fromNode === id || c.toNode === id);
            toRemove.forEach(c => c.pathEl.remove());
            connections = connections.filter(c => c.fromNode !== id && c.toNode !== id);
            delete workflowData[id];
        }

        window.clearCanvas = function() {
            nodesContainer.innerHTML = ''; svgLayer.innerHTML = '';
            connections = []; Object.keys(workflowData).forEach(k => delete workflowData[k]);
        }

        // ================= 数据流转与 API 调度 =================
        function flowDataDownstream(sourceNodeId) {
            const data = workflowData[sourceNodeId];
            if (!data) return;

            connections.forEach(conn => {
                if (conn.fromNode === sourceNodeId) {
                    const targetId = conn.toNode;
                    const portType = conn.targetInputType; 
                    
                    if (data.type === 'text' && portType === 'prompt') {
                        const el = document.getElementById(`val_${targetId}`);
                        if(el) { el.value = data.value; el.style.background = '#e3f2fd'; setTimeout(()=>el.style.background='', 500); }
                    } 
                    else if (data.type === 'image' && portType === 'image') {
                        const el = document.getElementById(`ref_${targetId}`);
                        if(el) { el.value = data.value; el.style.background = '#e3f2fd'; setTimeout(()=>el.style.background='', 500); }
                    }
                }
            });
        }

        window.runAPI = async function(nodeId, type) {
            const url = document.getElementById('global-url').value.replace(/\/$/, '');
            const key = document.getElementById('global-key').value;
            if(!url || !key) { alert("请先在右侧面板配置 API 接口和 Key！"); switchRightPanel('settings'); return; }

            const btn = document.getElementById(`btn_${nodeId}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = `处理中...`; btn.disabled = true;

            try {
                if (type === 't2i' || type === 'i2i') {
                    const model = document.getElementById(`model_${nodeId}`).value;
                    const prompt = document.getElementById(`val_${nodeId}`).value;
                    const sizeEl = document.getElementById(`size_${nodeId}`);
                    const size = sizeEl ? sizeEl.value : "1024x1024";

                    const res = await fetch(`${url}/images/generations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ model: model, prompt: prompt, n: 1, size: size })
                    });
                    const data = await res.json();
                    
                    if(data.data && data.data[0].url) {
                        const imgUrl = data.data[0].url;
                        document.getElementById(`img_${nodeId}`).src = imgUrl;
                        document.getElementById(`res_${nodeId}`).style.display = 'block';
                        
                        workflowData[nodeId] = { type: 'image', value: imgUrl };
                        flowDataDownstream(nodeId);
                    } else throw new Error(JSON.stringify(data));
                } else if (type === 'video') {
                    const ref = document.getElementById(`ref_${nodeId}`).value;
                    if(!ref) throw new Error("视频生成需要参考图 URL");
                    alert(`演示: 视频 API 模拟请求成功\n参考图: ${ref}`);
                }
            } catch(e) { alert("失败:\n" + e.message); } 
            finally { btn.innerHTML = originalText; btn.disabled = false; }
        };

        // 聊天系统
        let chatMem = [];
        window.sendChat = async function() {
            const url = document.getElementById('global-url').value.replace(/\/$/, '');
            const key = document.getElementById('global-key').value;
            const model = document.getElementById('chatModel').value;
            const prompt = document.getElementById('chatInput').value;
            if(!prompt || !key) return;

            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user"><div class="bubble">${prompt}</div></div>`;
            chatMem.push({role: "user", content: prompt});
            document.getElementById('chatInput').value = '';
            win.scrollTop = win.scrollHeight;

            try {
                const res = await fetch(`${url}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: model, messages: chatMem })
                });
                const data = await res.json();
                const aiText = data.choices[0].message.content;
                win.innerHTML += `<div class="msg ai"><div class="bubble">${aiText.replace(/\n/g, '<br>')}</div></div>`;
                chatMem.push({role: "assistant", content: aiText});
            } catch(e) { win.innerHTML += `<div class="msg ai"><div class="bubble">❌ ${e.message}</div></div>`; }
            win.scrollTop = win.scrollHeight;
        };
    </script>
</body>
</html>
