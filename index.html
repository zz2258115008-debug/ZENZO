<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 灵感便签 - 磁吸连线版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #f8f9fa; --grid-line: #e9ecef;
            --text-main: #343a40; --text-sub: #6c757d;
            --m-blue: #4dabf7; --border-soft: #dee2e6;
        }

        body { margin: 0; overflow: hidden; font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg-paper); color: var(--text-main); user-select: none; }
        
        /* 1. 画布与网格 */
        #viewport { position: absolute; left: 60px; right: 320px; top: 0; bottom: 0; overflow: hidden; cursor: grab; background-color: var(--bg-paper); background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size: 40px 40px; }
        #canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        
        /* SVG 连线层 */
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 0; }
        .wire { fill: none; stroke: #adb5bd; stroke-width: 4; transition: stroke 0.2s; stroke-linecap: round; }
        .wire.active { stroke: #495057; stroke-width: 5; }
        .wire.temp { stroke-dasharray: 8 8; animation: dash 0.5s linear infinite; stroke: var(--m-blue); pointer-events: none;}
        @keyframes dash { to { stroke-dashoffset: -16; } }

        /* 2. 左侧悬浮工具栏 */
        #toolbar { position: absolute; left: 10px; top: 20px; width: 44px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; padding: 15px 0; z-index: 100; gap: 15px; border: 1px solid #fff;}
        .tool-btn { width: 32px; height: 32px; border-radius: 10px; border: none; background: transparent; color: var(--text-sub); font-size: 14px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .tool-btn:hover { background: var(--bg-paper); color: var(--m-blue); }

        /* 3. 右侧面板 (聊天 / 设置) */
        #right-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 320px; background: #fff; border-left: 1px solid var(--border-soft); box-shadow: -5px 0 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; z-index: 100; }
        .panel-tabs { display: flex; border-bottom: 1px solid var(--border-soft); background: #fafafa; }
        .panel-tab { flex: 1; padding: 15px 0; text-align: center; font-size: 14px; color: var(--text-sub); cursor: pointer; font-weight: bold; transition: 0.2s;}
        .panel-tab.active { color: var(--m-blue); background: #fff; box-shadow: inset 0 -2px 0 var(--m-blue); }
        .panel-content { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
        .panel-content.active { display: flex; }

        /* 设置区 */
        .settings-area { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .settings-area label { font-size: 12px; color: var(--text-sub); font-weight: bold; }
        .settings-area input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; background: #fafafa; transition: 0.2s; }
        .settings-area input:focus { border-color: var(--m-blue); background: #fff; }

        /* 聊天区 */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #fafafa;}
        .msg { display: flex; width: 100%; }
        .msg.user { justify-content: flex-end; }
        .msg.ai { justify-content: flex-start; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 13px; line-height: 1.5; word-wrap: break-word; user-select: text; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .msg.user .bubble { background: #e3f2fd; color: #0d47a1; border-bottom-right-radius: 4px; }
        .msg.ai .bubble { background: #fff; border: 1px solid #eee; border-bottom-left-radius: 4px; }
        
        .chat-input-box { padding: 15px; background: #fff; border-top: 1px solid var(--border-soft); display: flex; flex-direction: column; gap: 8px; }
        .chat-input-box textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; resize: none; outline: none; font-family: inherit;}
        .send-btn { padding: 10px; background: var(--text-main); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { background: var(--m-blue); }

        /* ================= 4. 盲盒便签节点 (核心美化) ================= */
        #nodes-container { position: absolute; top: 0; left: 0; z-index: 1; }
        .node { 
            position: absolute; border-radius: 4px; 
            /* 悬浮立体纸张阴影 */
            box-shadow: 2px 4px 10px rgba(0,0,0,0.08), 5px 10px 20px rgba(0,0,0,0.05); 
            width: 260px; display: flex; flex-direction: column; transition: transform 0.1s; 
        }
        /* 便签右下角的卷边特效 */
        .node::after {
            content: ""; position: absolute; bottom: 0; right: 0;
            width: 30px; height: 30px;
            background: linear-gradient(135deg, rgba(0,0,0,0.03) 0%, rgba(255,255,255,0.3) 100%);
            border-top-left-radius: 8px; pointer-events: none;
        }
        .node:hover { transform: translateY(-2px); box-shadow: 3px 6px 15px rgba(0,0,0,0.1), 8px 15px 25px rgba(0,0,0,0.08); z-index: 10;}
        
        .node-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; font-size: 14px; font-weight: bold; color: rgba(0,0,0,0.7); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .node-header i { cursor: pointer; color: rgba(0,0,0,0.3); transition: 0.2s; }
        .node-header i:hover { color: #ff5252; }

        .node-content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        /* 输入框半透明，融入便签底色 */
        .node-content input, .node-content select, .node-content textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; font-size: 12px; outline: none; background: rgba(255,255,255,0.6); color: #333; font-family: inherit; transition: 0.2s;}
        .node-content input:focus, .node-content select:focus, .node-content textarea:focus { background: #fff; border-color: rgba(0,0,0,0.3); }
        
        .run-node-btn { background: rgba(0,0,0,0.7); color: #fff; border: none; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .run-node-btn:hover { background: #000; }

        .node-result { margin-top: 5px; position: relative; display: none; }
        .node-result img { width: 100%; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: block; }
        
        /* 衍生引用按钮 */
        .derive-btn { position: absolute; bottom: 8px; right: 8px; background: rgba(255,255,255,0.9); color: #333; border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s; display: flex; align-items: center; gap: 4px;}
        .derive-btn:hover { background: var(--m-blue); color: #fff; transform: scale(1.05); }

        /* ================= 5. 真实物理端口 (加大触碰面积) ================= */
        .port-container { position: absolute; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; cursor: crosshair; z-index: 20; }
        .port { width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 3px solid rgba(0,0,0,0.5); transition: 0.2s; pointer-events: none; }
        .port-container:hover .port { transform: scale(1.4); background: rgba(0,0,0,0.8); border-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.2);}
        
        .port-in { left: -18px; }
        .port-out { right: -18px; }

        /* ================= 6. 右键/双击悬浮菜单 ================= */
        .context-menu { position: absolute; display: none; z-index: 2000; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border: 1px solid #eee; border-radius: 12px; padding: 8px; color: #333; box-shadow: 0 10px 40px rgba(0,0,0,0.15); min-width: 150px; animation: popIn 0.1s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .context-menu .menu-title { font-size: 12px; color: #aaa; padding: 4px 8px 8px; border-bottom: 1px solid #eee; margin-bottom: 4px; }
        .context-menu .menu-item { padding: 10px; font-size: 14px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .context-menu .menu-item:hover { background: #f0f4f8; color: var(--m-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="tool-btn" onclick="viewport.style.cursor='grab'" title="平移"><i class="fas fa-hand"></i></button>
        <button class="tool-btn" onclick="clearCanvas()" title="清空"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div id="right-panel">
        <div class="panel-tabs">
            <div class="panel-tab active" onclick="switchRightPanel('chat')">💬 剧本推演</div>
            <div class="panel-tab" onclick="switchRightPanel('settings')">⚙️ 全局设置</div>
        </div>
        
        <div id="panel-chat" class="panel-content active">
            <div id="chat-window">
                <div class="msg ai"><div class="bubble">💡 <b>更新播报：</b><br>1. 修复了 DALL-E 3 分辨率报错。<br>2. 新增「磁吸连线」功能，拖拽线条靠近端口即可自动吸附。<br>3. 双击空白处，抽取属于你的盲盒便签吧！</div></div>
            </div>
            <div class="chat-input-box">
                <input id="chatModel" type="text" value="gpt-4o" style="padding:6px; border:1px solid #eee; border-radius:6px; font-size:12px; outline:none;" />
                <textarea id="chatInput" rows="3" placeholder="输入对话..."></textarea>
                <button class="send-btn" onclick="sendChat()">发 送</button>
            </div>
        </div>

        <div id="panel-settings" class="panel-content">
            <div class="settings-area">
                <label>API 接口地址 (需带 /v1)</label>
                <input id="global-url" type="text" value="https://nexusapi.cn/v1" />
                <label>API Key (令牌)</label>
                <input id="global-key" type="password" placeholder="sk-..." />
            </div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas">
            <svg id="svg-layer"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>

    <div id="add-menu" class="context-menu">
        <div class="menu-title">抽取一张便签</div>
        <div class="menu-item" onclick="spawnNode('text')">📝 文本节点</div>
        <div class="menu-item" onclick="spawnNode('t2i')">🎨 生图节点</div>
        <div class="menu-item" onclick="spawnNode('i2i')">🖼️ 图生图节点</div>
        <div class="menu-item" onclick="spawnNode('video')">🎬 视频节点</div>
    </div>

    <div id="derive-menu" class="context-menu">
        <div class="menu-title">引用图片衍生为...</div>
        <div class="menu-item" onclick="deriveNode('i2i')">🖼️ 图生图</div>
        <div class="menu-item" onclick="deriveNode('video')">🎬 视频生成</div>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('canvas');
        const svgLayer = document.getElementById('svg-layer');
        const nodesContainer = document.getElementById('nodes-container');

        // ================= 马卡龙盲盒色系库 =================
        const macaronColors = [
            '#ffcdd2', '#f8bbd0', '#e1bee7', '#d1c4e9', '#c5cae9', 
            '#bbdefb', '#b3e5fc', '#b2ebf2', '#b2dfdb', '#c8e6c9', 
            '#dcedc8', '#f0f4c3', '#fff9c4', '#ffecb3', '#ffe0b2'
        ];

        // ================= UI 切换与菜单 =================
        function switchRightPanel(tab) {
            document.querySelectorAll('.panel-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
        }

        let clickX = 0, clickY = 0;
        let sourceNodeForDerive = null;

        function hideMenus() {
            document.getElementById('add-menu').style.display = 'none';
            document.getElementById('derive-menu').style.display = 'none';
        }

        window.addEventListener('mousedown', (e) => {
            if(!e.target.closest('.context-menu') && !e.target.closest('.derive-btn')) hideMenus();
        });

        viewport.addEventListener('dblclick', (e) => {
            if(e.target.closest('.node')) return; 
            clickX = (e.clientX - 60 - panX) / scale;
            clickY = (e.clientY - panY) / scale;
            const menu = document.getElementById('add-menu');
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.style.display = 'block';
        });

        window.openDeriveMenu = function(e, nodeId) {
            e.stopPropagation(); sourceNodeForDerive = nodeId;
            const menu = document.getElementById('derive-menu');
            menu.style.left = e.clientX + 10 + 'px';
            menu.style.top = e.clientY - 10 + 'px';
            menu.style.display = 'block';
        };

        window.deriveNode = function(targetType) {
            hideMenus();
            if(!sourceNodeForDerive) return;
            const srcNode = document.getElementById(sourceNodeForDerive);
            const srcX = parseFloat(srcNode.style.left);
            const srcY = parseFloat(srcNode.style.top);
            
            const newNodeId = addNode(targetType, srcX + 320, srcY);
            
            setTimeout(() => {
                const srcOutPort = srcNode.querySelector('.port-out');
                const targetInPort = document.getElementById(newNodeId).querySelector('.port-in');
                if(srcOutPort && targetInPort) {
                    createPhysicalConnection(srcOutPort, targetInPort);
                    flowDataDownstream(sourceNodeForDerive);
                }
            }, 50);
        };

        // ================= 画布漫游引擎 =================
        let scale = 1, panX = 0, panY = 0, isPanning = false, startX, startY;

        viewport.addEventListener('mousedown', (e) => {
            if(e.target.closest('.node') || e.target.closest('.port-container')) return; 
            if(e.button === 0) {
                isPanning = true; viewport.style.cursor = 'grabbing';
                startX = e.clientX - panX; startY = e.clientY - panY;
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            panX = e.clientX - startX; panY = e.clientY - startY;
            updateCanvas();
        });
        window.addEventListener('mouseup', () => { isPanning = false; viewport.style.cursor = 'grab'; });
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const newScale = Math.min(Math.max(0.2, scale + (e.deltaY * -0.001)), 2);
            const mouseX = e.clientX - panX - 60; 
            const mouseY = e.clientY - panY;
            panX -= mouseX * (newScale / scale - 1); panY -= mouseY * (newScale / scale - 1);
            scale = newScale; updateCanvas(); updateAllWires();
        }, { passive: false });

        function updateCanvas() { canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }

        // ================= 智能磁吸连线系统 (百分百连上) =================
        let connections = []; 
        let isWiring = false, tempWire = null, wiringStartPort = null;

        function createBezier(x1, y1, x2, y2) {
            const dx = Math.abs(x2 - x1) * 0.5 + 50;
            return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
        }

        function getPortCoords(port) {
            const rect = port.getBoundingClientRect();
            const cvsRect = canvas.getBoundingClientRect();
            return { x: (rect.left + rect.width/2 - cvsRect.left)/scale, y: (rect.top + rect.height/2 - cvsRect.top)/scale };
        }

        function updateAllWires() {
            connections.forEach(c => {
                const p1 = getPortCoords(c.fromPort); const p2 = getPortCoords(c.toPort);
                c.pathEl.setAttribute('d', createBezier(p1.x, p1.y, p2.x, p2.y));
            });
        }

        window.addEventListener('mousedown', (e) => {
            const port = e.target.closest('.port-out');
            if (port) {
                isWiring = true; wiringStartPort = port;
                tempWire = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                tempWire.setAttribute('class', 'wire temp');
                svgLayer.appendChild(tempWire);
                e.stopPropagation();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isWiring && tempWire) {
                const p1 = getPortCoords(wiringStartPort);
                const mouseX = (e.clientX - canvas.getBoundingClientRect().left) / scale;
                const mouseY = (e.clientY - canvas.getBoundingClientRect().top) / scale;
                tempWire.setAttribute('d', createBezier(p1.x, p1.y, mouseX, mouseY));
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isWiring) {
                // 【核心黑科技：磁吸算法】计算鼠标离所有输入端口的绝对距离
                let closestPort = null;
                let minDistance = 60; // 磁吸范围：60像素内自动吸附

                document.querySelectorAll('.port-in').forEach(inPort => {
                    const rect = inPort.getBoundingClientRect();
                    const portCenterX = rect.left + rect.width / 2;
                    const portCenterY = rect.top + rect.height / 2;
                    const dist = Math.hypot(e.clientX - portCenterX, e.clientY - portCenterY);
                    
                    if(dist < minDistance && inPort.closest('.node').id !== wiringStartPort.closest('.node').id) {
                        minDistance = dist;
                        closestPort = inPort;
                    }
                });

                if (closestPort) {
                    createPhysicalConnection(wiringStartPort, closestPort);
                    flowDataDownstream(wiringStartPort.closest('.node').id);
                }
                
                if (tempWire) tempWire.remove();
                isWiring = false; wiringStartPort = null;
            }
        });

        function createPhysicalConnection(outPort, inPort) {
            if(connections.find(c => c.fromPort === outPort && c.toPort === inPort)) return;
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('class', 'wire active');
            svgLayer.appendChild(path);
            connections.push({
                fromNode: outPort.closest('.node').id, toNode: inPort.closest('.node').id,
                fromPort: outPort, toPort: inPort, pathEl: path, targetInputType: inPort.dataset.type 
            });
            updateAllWires();
        }

        // ================= 节点工厂 =================
        let nodeIndex = 0;
        const workflowData = {}; 

        window.spawnNode = function(type) { hideMenus(); addNode(type, clickX, clickY); }

        function addNode(type, x, y) {
            nodeIndex++; const nodeId = `node_${nodeIndex}`;
            const node = document.createElement('div');
            node.className = `node ${type}-node`; node.id = nodeId;
            node.style.left = `${x}px`; node.style.top = `${y}px`;
            
            // 抽取盲盒便签颜色
            const randomColor = macaronColors[Math.floor(Math.random() * macaronColors.length)];
            node.style.backgroundColor = randomColor;

            let html = '';
            
            if (type === 'text') {
                html = `
                    <div class="node-header"><span>📝 文本记录</span><i class="fas fa-times" onclick="deleteNode('${nodeId}')"></i></div>
                    <div class="node-content">
                        <textarea id="val_${nodeId}" rows="5" placeholder="写下你的设定..."></textarea>
                    </div>
                    <div class="port-container port-out" style="top:50%;"><div class="port"></div></div>
                `;
            } 
            else if (type === 't2i') {
                // 完美修复 DALL-E-3 分辨率白名单
                html = `
                    <div class="node-header"><span>🎨 AI 画手</span><i class="fas fa-times" onclick="deleteNode('${nodeId}')"></i></div>
                    <div class="node-content">
                        <input id="model_${nodeId}" type="text" value="dall-e-3" placeholder="模型名称" />
                        <select id="size_${nodeId}">
                            <option value="1024x1024">方图 (1024x1024)</option>
                            <option value="1792x1024">横屏 (1792x1024)</option>
                            <option value="1024x1792">竖屏 (1024x1792)</option>
                        </select>
                        <textarea id="val_${nodeId}" rows="3" placeholder="描述画面或连线获取..."></textarea>
                        <button class="run-node-btn" id="btn_${nodeId}" onclick="runAPI('${nodeId}', 't2i')">✨ 施展魔法</button>
                        <div class="node-result" id="res_${nodeId}">
                            <img id="img_${nodeId}" />
                            <button class="derive-btn" onclick="openDeriveMenu(event, '${nodeId}')">⚡ 引用</button>
                        </div>
                    </div>
                    <div class="port-container port-in" data-type="prompt" style="top:120px;"><div class="port"></div></div>
                    <div class="port-container port-out" style="top:50%;"><div class="port"></div></div>
                `;
            }
            else if (type === 'i2i' || type === 'video') {
                const title = type === 'i2i' ? '🖼️ 图片变幻' : '🎬 动效渲染';
                const modelDef = type === 'i2i' ? 'dall-e-3' : 'kling-v1';
                html = `
                    <div class="node-header"><span>${title}</span><i class="fas fa-times" onclick="deleteNode('${nodeId}')"></i></div>
                    <div class="node-content">
                        <input id="model_${nodeId}" type="text" value="${modelDef}" />
                        <input id="ref_${nodeId}" type="text" placeholder="参考图 (可连线自动填入)" style="border-left: 3px solid rgba(0,0,0,0.5);"/>
                        <textarea id="val_${nodeId}" rows="2" placeholder="附加提示词..."></textarea>
                        <button class="run-node-btn" id="btn_${nodeId}" onclick="runAPI('${nodeId}', '${type}')">✨ 施展魔法</button>
                        <div class="node-result" id="res_${nodeId}"><img id="img_${nodeId}" style="display:none;" /></div>
                    </div>
                    <div class="port-container port-in" data-type="image" style="top:80px;"><div class="port"></div></div>
                    <div class="port-container port-in" data-type="prompt" style="top:120px;"><div class="port"></div></div>
                    <div class="port-container port-out" style="top:50%;"><div class="port"></div></div>
                `;
            }

            node.innerHTML = html;
            
            const header = node.querySelector('.node-header');
            let isDragging = false, nx, ny, ix, iy;
            header.addEventListener('mousedown', (e) => {
                isDragging = true; nx = e.clientX; ny = e.clientY;
                ix = parseFloat(node.style.left); iy = parseFloat(node.style.top);
                document.querySelectorAll('.node').forEach(n => n.style.zIndex = '1'); node.style.zIndex = '10';
                e.stopPropagation();
            });
            window.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    node.style.left = `${ix + (e.clientX - nx)/scale}px`;
                    node.style.top = `${iy + (e.clientY - ny)/scale}px`;
                    updateAllWires();
                }
            });
            window.addEventListener('mouseup', () => isDragging = false);

            nodesContainer.appendChild(node);
            
            if(type === 'text') {
                document.getElementById(`val_${nodeId}`).addEventListener('input', (e) => {
                    workflowData[nodeId] = { type: 'text', value: e.target.value };
                    flowDataDownstream(nodeId);
                });
            }
            return nodeId;
        }

        window.deleteNode = function(id) {
            document.getElementById(id).remove();
            const toRemove = connections.filter(c => c.fromNode === id || c.toNode === id);
            toRemove.forEach(c => c.pathEl.remove());
            connections = connections.filter(c => c.fromNode !== id && c.toNode !== id);
            delete workflowData[id];
        }

        window.clearCanvas = function() {
            nodesContainer.innerHTML = ''; svgLayer.innerHTML = '';
            connections = []; Object.keys(workflowData).forEach(k => delete workflowData[k]);
        }

        // ================= 数据流转与 API 执行 =================
        function flowDataDownstream(sourceNodeId) {
            const data = workflowData[sourceNodeId];
            if (!data) return;

            connections.forEach(conn => {
                if (conn.fromNode === sourceNodeId) {
                    const targetId = conn.toNode;
                    const portType = conn.targetInputType; 
                    
                    if (data.type === 'text' && portType === 'prompt') {
                        const el = document.getElementById(`val_${targetId}`);
                        if(el) { el.value = data.value; el.style.background = '#fff'; setTimeout(()=>el.style.background='', 300); }
                    } 
                    else if (data.type === 'image' && portType === 'image') {
                        const el = document.getElementById(`ref_${targetId}`);
                        if(el) { el.value = data.value; el.style.background = '#fff'; setTimeout(()=>el.style.background='', 300); }
                    }
                }
            });
        }

        window.runAPI = async function(nodeId, type) {
            const url = document.getElementById('global-url').value.replace(/\/$/, '');
            const key = document.getElementById('global-key').value;
            if(!url || !key) { alert("请先在右侧面板配置 API 接口和 Key！"); switchRightPanel('settings'); return; }

            const btn = document.getElementById(`btn_${nodeId}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = `施法中...`; btn.disabled = true;

            try {
                if (type === 't2i' || type === 'i2i') {
                    const model = document.getElementById(`model_${nodeId}`).value;
                    const prompt = document.getElementById(`val_${nodeId}`).value;
                    const sizeEl = document.getElementById(`size_${nodeId}`);
                    const size = sizeEl ? sizeEl.value : "1024x1024";

                    const res = await fetch(`${url}/images/generations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ model: model, prompt: prompt, n: 1, size: size })
                    });
                    const data = await res.json();
                    
                    if(data.data && data.data[0].url) {
                        const imgUrl = data.data[0].url;
                        document.getElementById(`img_${nodeId}`).src = imgUrl;
                        document.getElementById(`res_${nodeId}`).style.display = 'block';
                        
                        workflowData[nodeId] = { type: 'image', value: imgUrl };
                        flowDataDownstream(nodeId);
                    } else throw new Error(JSON.stringify(data));
                } else if (type === 'video') {
                    const ref = document.getElementById(`ref_${nodeId}`).value;
                    if(!ref) throw new Error("视频生成需要连线输入参考图");
                    alert(`✅ 视频 API 模拟请求成功\n数据已接收，首帧图: ${ref.substring(0,30)}...`);
                }
            } catch(e) { alert("失败:\n" + e.message); } 
            finally { btn.innerHTML = originalText; btn.disabled = false; }
        };

        // ================= 聊天系统 =================
        let chatMem = [];
        window.sendChat = async function() {
            const url = document.getElementById('global-url').value.replace(/\/$/, '');
            const key = document.getElementById('global-key').value;
            const model = document.getElementById('chatModel').value;
            const prompt = document.getElementById('chatInput').value;
            if(!prompt || !key) return;

            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user"><div class="bubble">${prompt}</div></div>`;
            chatMem.push({role: "user", content: prompt});
            document.getElementById('chatInput').value = '';
            win.scrollTop = win.scrollHeight;

            try {
                const res = await fetch(`${url}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: model, messages: chatMem })
                });
                const data = await res.json();
                const aiText = data.choices[0].message.content;
                win.innerHTML += `<div class="msg ai"><div class="bubble">${aiText.replace(/\n/g, '<br>')}</div></div>`;
                chatMem.push({role: "assistant", content: aiText});
            } catch(e) { win.innerHTML += `<div class="msg ai"><div class="bubble">❌ ${e.message}</div></div>`; }
            win.scrollTop = win.scrollHeight;
        };
    </script>
</body>
</html>
