<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 全能节点画布 - 对标 TapNow</title>
    <link rel="stylesheet" href="https://unpkg.com/tldraw@3/tldraw.css" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; }
        #my-canvas { position: fixed; inset: 0; z-index: 1; }
        
        #sidebar { position: absolute; top: 20px; left: 20px; bottom: 20px; width: 320px; background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(10px); z-index: 999; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { margin: 0 0 15px 0; font-size: 18px; color: #fff; display: flex; align-items: center; gap: 8px;}
        .api-setup input { width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 10px; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 12px; }

        .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1 1 33%; background: none; border: none; color: #aaa; padding: 12px 0; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .tab-btn.active { color: #0070f3; font-weight: bold; border-bottom: 2px solid #0070f3; background: rgba(0, 112, 243, 0.1); }

        .workspace { padding: 20px; flex-grow: 1; overflow-y: auto; display: none; }
        .workspace.active { display: block; }
        .workspace label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .workspace textarea, .workspace input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 14px; resize: vertical; }
        
        .generate-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #0070f3, #8a2be2); border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 112, 243, 0.4); }
        .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .generate-btn:active { transform: translateY(1px); }
        
        /* 引擎启动时的遮罩层 */
        #loading-overlay { position: fixed; inset: 0; background: #121212; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; transition: opacity 0.5s; pointer-events: none; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #0070f3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "tldraw": "https://esm.sh/tldraw@3.3.0?external=react,react-dom"
        }
    }
    </script>
</head>
<body>
    
    <div id="loading-overlay">
        <div class="loader"></div>
        <div>🚀 正在组装无限画布引擎，首次加载可能需要几秒...</div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>⚙️ 全局 API 配置</h2>
            <div class="api-setup">
                <input id="globalApiUrl" type="text" placeholder="全局接口地址 (如 https://api.xxx.com/v1)" />
                <input id="globalApiKey" type="password" placeholder="填写你的 API Key" />
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('chat')">💬 AI对话</button>
            <button class="tab-btn" onclick="switchTab('t2i')">🎨 文生图</button>
            <button class="tab-btn" onclick="switchTab('i2i')">🖼️ 图生图</button>
            <button class="tab-btn" onclick="switchTab('t2v')">🎬 文生视频</button>
            <button class="tab-btn" onclick="switchTab('i2v')">🎞️ 图视频</button>
        </div>

        <div id="tab-chat" class="workspace active">
            <label>模型名称</label>
            <input id="chatModel" type="text" value="gpt-4o" />
            <label>你想聊点什么？</label>
            <textarea id="chatPrompt" rows="4" placeholder="例如：帮我写一段山海经异兽出场的旁白..."></textarea>
            <button id="btn-chat" class="generate-btn">发送并生成文本卡片</button>
        </div>

        <div id="tab-t2i" class="workspace"><button class="generate-btn" onclick="alert('即将打通本地 ComfyUI 接口！')">暂未打通</button></div>
        <div id="tab-i2i" class="workspace"><button class="generate-btn" onclick="alert('暂未打通')">暂未打通</button></div>
        <div id="tab-t2v" class="workspace"><button class="generate-btn" onclick="alert('暂未打通')">暂未打通</button></div>
        <div id="tab-i2v" class="workspace"><button class="generate-btn" onclick="alert('暂未打通')">暂未打通</button></div>
    </div>
    
    <div id="my-canvas"></div>

    <script>
        // UI 切换逻辑
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.workspace').forEach(ws => ws.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        };
    </script>

    <script type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        import { Tldraw, createShapeId } from 'tldraw';

        window.myEditor = null;

        // 挂载画板
        const App = () => {
            return React.createElement(Tldraw, {
                onMount: (editor) => {
                    window.myEditor = editor;
                    // 引擎彻底启动成功，隐藏加载遮罩
                    const overlay = document.getElementById('loading-overlay');
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 500);
                }
            })
        };

        const root = createRoot(document.getElementById('my-canvas'));
        root.render(React.createElement(App));

        // 绑定“发送”按钮的点击事件
        document.getElementById('btn-chat').addEventListener('click', async (e) => {
            if (!window.myEditor) {
                alert("⚠️ 画布引擎还没准备好，请刷新页面重试！");
                return;
            }

            const btn = e.target;
            let rawUrl = document.getElementById('globalApiUrl').value.trim();
            const key = document.getElementById('globalApiKey').value.trim();
            const prompt = document.getElementById('chatPrompt').value.trim();
            const model = document.getElementById('chatModel').value.trim();
            
            if(!rawUrl || !key) {
                alert("⚠️ 兄弟，先把顶部的 API 接口地址和 Key 填上！");
                return;
            }
            if(!prompt) {
                alert("⚠️ 你什么都没写，AI 不知道该干嘛！");
                return;
            }

            // 智能修复 URL 填写错误
            let cleanUrl = rawUrl.endsWith('/') ? rawUrl.slice(0, -1) : rawUrl;
            let finalUrl = cleanUrl.endsWith('/chat/completions') ? cleanUrl : cleanUrl + '/chat/completions';

            const originalText = btn.innerText;
            btn.innerText = "⏳ 呼叫 AI 中...";
            btn.style.opacity = "0.7";

            try {
                // 真正发起网络请求
                const response = await fetch(finalUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
                    body: JSON.stringify({ model: model, messages: [{"role": "user", "content": prompt}] })
                });
                
                if(!response.ok) {
                    const err = await response.text();
                    throw new Error(`服务器拒绝了请求 (状态码 ${response.status})\n可能是你的 Key 填错了或者欠费了。\n\n详细错误：${err}`);
                }

                const data = await response.json();
                
                if(data.choices && data.choices[0].message) {
                    const resultText = data.choices[0].message.content;
                    
                    // 获取当前画布的中心位置
                    const bounds = window.myEditor.getViewportPageBounds();
                    const centerX = bounds.x + bounds.w / 2;
                    const centerY = bounds.y + bounds.h / 2;

                    // 召唤便利贴！
                    window.myEditor.createShapes([{
                        id: createShapeId(),
                        type: 'note', 
                        x: centerX,
                        y: centerY,
                        props: {
                            text: resultText,
                            color: 'blue',
                            size: 'm'
                        }
                    }]);
                } else { 
                    throw new Error("API 接口返回的数据格式不对"); 
                }
            } catch (error) {
                alert("❌ 运行报错：\n" + error.message);
            } finally {
                // 恢复按钮状态
                btn.innerText = originalText;
                btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
